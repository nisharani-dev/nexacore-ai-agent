# render.yaml — Render.com deployment config
# Deploys the backend as a web service on Render's free tier.
#
# Setup:
#   1. Go to https://dashboard.render.com
#   2. New → Blueprint → connect your GitHub fork
#   3. Render auto-detects this file and creates the service
#   4. Add GROQ_API_KEY in the Render dashboard → Environment tab

services:
  - type: web
    name: ramp-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m backend.main
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8000
      - key: LOG_LEVEL
        value: INFO
      - key: HINDSIGHT_BACKEND
        value: local
      - key: INTEGRATIONS_MODE
        value: demo
      - key: AUTH_REQUIRED
        value: false
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: HINDSIGHT_STORE_PATH
        value: /opt/render/project/src/data/hindsight_store.json
      - key: GROQ_API_KEY
        sync: false   # Set this manually in Render dashboard
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: CORS_ALLOW_ORIGINS
        value: "*"    # Update to your Vercel URL after deploy
    disk:
      name: ramp-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
