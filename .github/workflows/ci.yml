name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Compile backend
        run: python -m compileall backend config
      - name: Run unit tests
        run: pytest backend/tests --ignore=backend/tests/load_test.py -v --cov=backend --cov-report=term-missing --cov-report=xml
      - name: Validate ingestion dry run
        run: python -m backend.ingestion.ingest_runner --dry-run
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend unit tests
        run: npm test
      - name: Build frontend
        run: npm run build

  load-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run load test (dry)
        run: python backend/tests/load_test.py --help || true
