name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Compile backend
        run: python -m compileall backend config
      - name: Run unit tests
        run: pytest backend/tests --ignore=backend/tests/load_test.py -v --cov=backend --cov-report=term-missing --cov-report=xml
      - name: Validate ingestion dry run
        run: python -m backend.ingestion.ingest_runner --dry-run
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend unit tests
        run: npm test
      - name: Build frontend
        run: npm run build

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ramp_test
          POSTGRES_USER: ramp
          POSTGRES_PASSWORD: ramp_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ramp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ramp:ramp_test_password@localhost:5432/ramp_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run Postgres smoke tests
        run: pytest backend/tests/test_postgres.py -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright e2e tests
        working-directory: frontend
        env:
          CI: "true"
          GROQ_API_KEY: test-key
        run: npm run test:e2e

  load-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run load test (dry)
        run: python backend/tests/load_test.py --help || true
